<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1929;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#132f4c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7928ca;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- 背景圆角方形 -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)" />
  <!-- 外圈光晕 -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#heartGrad)" stroke-width="8" opacity="0.3" />
  <!-- 心形 -->
  <path d="M256 400C176 340 96 300 96 220C96 160 146 120 196 120C236 120 271 140 256 180C241 140 276 120 316 120C366 120 416 160 416 220C416 300 336 340 256 400Z" fill="url(#heartGrad)" opacity="0.95" />
  <!-- 心跳折线 -->
  <path d="M186 280 L216 280 L236 220 L266 380 L286 300 L316 300 L336 260" stroke="#ffffff" stroke-width="10" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.95" />
  <!-- 底部小字 "AI" -->
  <text x="256" y="440" font-family="Arial, sans-serif" font-weight="bold" font-size="48" fill="#00f0ff" text-anchor="middle" letter-spacing="8">AI</text>
</svg>