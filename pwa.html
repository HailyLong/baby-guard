<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婴睿 · AI 生命监护</title>
<link rel="manifest" href="./manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020510;
            --panel-bg: rgba(8, 12, 26, 0.7);
            --cyan: #00f0ff;
            --pink: #ff2d78;
            --green: #00ff88;
            --yellow: #ffcc00;
            --border-glow: rgba(0, 240, 255, 0.4);
            --text-primary: #e0e8ff;
            --text-secondary: #7a85a0;
            --font-mono: 'Orbitron', 'Rajdhani', monospace;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }
        .grid-bg {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background-image:
                linear-gradient(rgba(0,240,255,0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,240,255,0.08) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index:0; pointer-events:none;
        }
        #fx-canvas {
            position: fixed; top:0; left:0; width:100%; height:100%;
            z-index:0; pointer-events:none;
        }
        .container {
            position: relative; z-index:1;
            width: 95%; max-width: 950px; text-align: center; padding: 20px;
        }
        .title {
            font-family: var(--font-mono);
            font-size: 2.5rem; font-weight:900; letter-spacing:6px;
            background: linear-gradient(180deg, #fff 30%, var(--cyan) 80%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 25px rgba(0,240,255,0.7));
            animation: titleGlitch 4s infinite;
        }
        @keyframes titleGlitch {
            0%,90%,100%{ transform:translate(0); }
            92%{ transform:translate(-3px,2px); }
            94%{ transform:translate(3px,-2px); }
            96%{ transform:translate(0); }
        }
        .subtitle {
            font-family: var(--font-mono); font-size:0.9rem;
            letter-spacing:8px; color:var(--text-secondary); margin-bottom:25px;
        }
        /* 模式切换按钮组 */
        .mode-bar {
            display: flex; justify-content: center; gap: 10px;
            margin-bottom: 30px; flex-wrap: wrap;
        }
        .mode-btn {
            padding: 8px 18px; font-family: var(--font-mono); font-size:0.8rem;
            font-weight:600; letter-spacing:2px;
            border:1px solid var(--border-glow); border-radius:2px;
            background: rgba(0,240,255,0.05); color: var(--text-secondary);
            cursor: pointer; transition: all 0.3s; text-transform: uppercase;
            backdrop-filter: blur(10px);
        }
        .mode-btn.active {
            background: rgba(0,240,255,0.15); color: var(--cyan);
            border-color: var(--cyan); box-shadow: 0 0 20px rgba(0,240,255,0.4);
        }
        .mode-btn:hover:not(.active) {
            background: rgba(0,240,255,0.1); color: #fff;
        }
        /* 连接按钮 */
        .btn-group {
            display: flex; justify-content: center; gap: 25px; margin-bottom: 20px;
        }
        .btn {
            padding: 12px 30px; font-family: var(--font-mono); font-size:0.9rem;
            font-weight:600; letter-spacing:3px;
            border:1px solid var(--border-glow); border-radius:2px;
            background: rgba(0,240,255,0.05); color: var(--cyan);
            cursor: pointer; text-transform: uppercase;
            transition: all 0.3s; backdrop-filter: blur(10px);
            clip-path: polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
        }
        .btn:hover:not(:disabled) {
            background: rgba(0,240,255,0.2);
            box-shadow: 0 0 40px rgba(0,240,255,0.5);
            border-color: #fff; color: #fff;
        }
        .btn:disabled { opacity:0.35; cursor:default; border-color:rgba(255,255,255,0.1); color:var(--text-secondary); }
        .btn-disconnect {
            border-color: rgba(255,45,120,0.4); color: var(--pink);
            background: rgba(255,45,120,0.05);
        }
        .btn-disconnect:hover:not(:disabled) {
            background: rgba(255,45,120,0.2);
            box-shadow: 0 0 40px rgba(255,45,120,0.5);
        }
        /* 状态栏 */
        .status-bar {
            font-family: var(--font-mono); font-size:0.8rem; letter-spacing:3px;
            color: var(--text-secondary); padding:10px 25px;
            background: var(--panel-bg); border:1px solid var(--border-glow);
            border-radius:2px; display:inline-flex; align-items:center; gap:12px;
            backdrop-filter: blur(25px); margin-bottom:15px;
        }
        .status-dot { display:inline-block; width:10px; height:10px; border-radius:50%; animation: dotPulse 1.5s infinite; }
        .dot-online { background:var(--green); box-shadow:0 0 15px var(--green); }
        .dot-offline { background:#555; box-shadow:none; }
        @keyframes dotPulse { 0%,100%{ opacity:1; } 50%{ opacity:0.3; } }
        /* 数据面板 */
        .main-panel {
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;
        }
        @media (max-width:650px){ .main-panel { grid-template-columns:1fr; } }
        .data-block {
            background: var(--panel-bg); border:1px solid var(--border-glow);
            border-radius:6px; padding:30px 20px; position:relative; overflow:hidden;
            backdrop-filter: blur(25px); transition: all 0.4s;
        }
        .data-block::before {
            content:''; position:absolute; top:0; left:0; width:100%; height:2px;
            background: linear-gradient(90deg, transparent, var(--cyan), transparent);
            animation: scanLine 3s linear infinite;
        }
        @keyframes scanLine { 0%{ transform:translateX(-100%); } 100%{ transform:translateX(100%); } }
        .block-label { font-family:var(--font-mono); font-size:0.8rem; letter-spacing:4px; color:var(--text-secondary); }
        .block-value { font-family:var(--font-mono); font-size:5rem; font-weight:900; letter-spacing:3px; }
        .block-unit { font-family:var(--font-mono); font-size:0.85rem; letter-spacing:3px; color:var(--text-secondary); }
        .block-value.heart {
            color:#ff4770; text-shadow:0 0 30px rgba(255,45,120,0.9),0 0 80px rgba(255,45,120,0.5);
            animation: heartGlow 1.5s infinite alternate;
        }
        @keyframes heartGlow {
            from{ text-shadow:0 0 30px rgba(255,45,120,0.7); }
            to{ text-shadow:0 0 50px rgba(255,45,120,1),0 0 100px rgba(255,45,120,0.6); }
        }
        .block-value.breath {
            color:#00ff88; text-shadow:0 0 30px rgba(0,255,136,0.9),0 0 80px rgba(0,255,136,0.5);
            animation: breathGlow 3s infinite alternate;
        }
        @keyframes breathGlow {
            from{ text-shadow:0 0 30px rgba(0,255,136,0.7); }
            to{ text-shadow:0 0 50px rgba(0,255,136,1),0 0 100px rgba(0,255,136,0.6); }
        }
        .motion-panel {
            background: var(--panel-bg); border:1px solid var(--border-glow);
            border-radius:6px; padding:20px; margin-bottom:20px;
            backdrop-filter: blur(25px); display:flex; align-items:center;
            justify-content: space-around; flex-wrap:wrap; gap:20px;
        }
        .motion-badge {
            font-family:var(--font-mono); padding:8px 28px; border-radius:2px;
            font-weight:700; letter-spacing:4px; font-size:1rem; text-transform:uppercase;
            clip-path: polygon(8px 0,100% 0,100% calc(100% - 8px),calc(100% - 8px) 100%,0 100%,0 8px);
        }
        .badge-quiet { background:rgba(0,255,136,0.15); color:var(--green); border:1px solid rgba(0,255,136,0.5); box-shadow:0 0 25px rgba(0,255,136,0.3); }
        .badge-slight { background:rgba(255,204,0,0.15); color:var(--yellow); border:1px solid rgba(255,204,0,0.5); box-shadow:0 0 25px rgba(255,204,0,0.3); }
        .badge-move { background:rgba(255,45,120,0.15); color:var(--pink); border:1px solid rgba(255,45,120,0.5); box-shadow:0 0 25px rgba(255,45,120,0.3); }
        .motion-index { font-family:var(--font-mono); font-size:2rem; font-weight:700; color:var(--yellow); text-shadow:0 0 25px rgba(255,204,0,0.7); }
        .wave-container {
            background: var(--panel-bg); border:1px solid var(--border-glow);
            border-radius:6px; padding:20px; margin-bottom:20px;
            backdrop-filter: blur(25px); position:relative;
        }
        canvas { width:100%; height:220px; border-radius:4px; background:rgba(0,0,0,0.5); }
        .log-box { display:none; }
        /* 网络配置弹窗 */
        .modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.8); z-index:100; justify-content:center; align-items:center;
        }
        .modal.active { display:flex; }
        .modal-content {
            background: var(--panel-bg); border:1px solid var(--border-glow);
            border-radius:6px; padding:30px; width:90%; max-width:400px;
            backdrop-filter: blur(30px); text-align:left;
        }
        .modal-content input {
            width:100%; padding:10px; margin:10px 0; background:rgba(0,0,0,0.5);
            border:1px solid var(--border-glow); color:var(--cyan);
            font-family:var(--font-mono); border-radius:2px;
        }
        .modal-content .btn { margin-top:15px; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <canvas id="fx-canvas"></canvas>

    <div class="container">
        <div class="title">VITAL SIGNS</div>
        <div class="subtitle">毫米波雷达 · 四合一监测终端</div>

        <!-- 模式选择 -->
        <div class="mode-bar" id="modeBar">
            <button class="mode-btn active" data-mode="serial">串口 有线</button>
            <button class="mode-btn" data-mode="ap">AP 热点</button>
            <button class="mode-btn" data-mode="sta">STA 局域网</button>
            <button class="mode-btn" data-mode="mqtt">MQTT 云端</button>
        </div>

        <!-- 连接 / 断开按钮 -->
        <div class="btn-group">
            <button class="btn" id="connectBtn">◈ 连接</button>
            <button class="btn btn-disconnect" id="disconnectBtn" disabled>◈ 断开</button>
        </div>

        <!-- 状态栏 -->
        <div class="status-bar">
            <span class="status-dot dot-offline" id="status-dot"></span>
            <span id="status-text">系统待命 · 未连接</span>
        </div>
        <br><br>

        <!-- 数据卡片 -->
        <div class="main-panel">
            <div class="data-block">
                <div class="block-label">❤ Heart Rate</div>
                <div class="block-value heart" id="heart-val">--</div>
                <div class="block-unit">BPM</div>
            </div>
            <div class="data-block">
                <div class="block-label">🌬 Breath Rate</div>
                <div class="block-value breath" id="breath-val">--</div>
                <div class="block-unit">/MIN</div>
            </div>
        </div>

        <!-- 体动面板 -->
        <div class="motion-panel">
            <span style="font-family:var(--font-mono); letter-spacing:3px; color:var(--text-secondary);">📳 体动状态</span>
            <span id="motion-badge" class="motion-badge">--</span>
            <span style="font-family:var(--font-mono); letter-spacing:3px; color:var(--text-secondary);">指数</span>
            <span class="motion-index" id="motion-val">--</span>
        </div>

        <!-- 波形图 -->
        <div class="wave-container">
            <canvas id="waveCanvas"></canvas>
        </div>

        <div class="log-box" id="logBox"></div>
    </div>

    <!-- AP/STA/MQTT 配置弹窗 (网络模式时弹出) -->
    <div class="modal" id="configModal">
        <div class="modal-content">
            <h3 id="configTitle">网络配置</h3>
            <input type="text" id="configInput1" placeholder="IP / SSID">
            <input type="text" id="configInput2" placeholder="端口 / 密码">
            <button class="btn" id="configSaveBtn">保存并连接</button>
            <button class="btn btn-disconnect" id="configCancelBtn">取消</button>
        </div>
    </div>

    <script>
        // ==================== 背景动画 (粒子+雷达波纹) ====================
        const fxCanvas = document.getElementById('fx-canvas');
        const fxCtx = fxCanvas.getContext('2d');
        fxCanvas.width = window.innerWidth;
        fxCanvas.height = window.innerHeight;
        const particles = [];
        for (let i=0;i<100;i++) {
            particles.push({
                x:Math.random()*fxCanvas.width, y:Math.random()*fxCanvas.height,
                r:Math.random()*1.8+0.5, dx:(Math.random()-0.5)*0.6, dy:(Math.random()-0.5)*0.6,
                baseAlpha:Math.random()*0.5+0.3, phase:Math.random()*Math.PI*2,
                speed:0.02+Math.random()*0.03
            });
        }
        let ripples = [];
        function spawnRipple(){
            ripples.push({
                x:fxCanvas.width/2, y:fxCanvas.height/2, radius:0,
                maxRadius:Math.max(fxCanvas.width,fxCanvas.height)*0.9,
                alpha:0.6, speed:1.2
            });
        }
        setInterval(spawnRipple,2500); spawnRipple();
        function animateFX(){
            fxCtx.clearRect(0,0,fxCanvas.width,fxCanvas.height);
            const now = Date.now()/1000;
            for(const p of particles){
                p.x+=p.dx; p.y+=p.dy;
                if(p.x<0||p.x>fxCanvas.width)p.dx*=-1;
                if(p.y<0||p.y>fxCanvas.height)p.dy*=-1;
                const breathe = Math.sin(now*p.speed*2*Math.PI+p.phase);
                const ca = Math.max(0.05,Math.min(0.95,p.baseAlpha+breathe*0.25));
                fxCtx.beginPath(); fxCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
                fxCtx.fillStyle=`rgba(0,240,255,${ca})`; fxCtx.fill();
                for(const p2 of particles){
                    const dist = Math.hypot(p.x-p2.x,p.y-p2.y);
                    if(dist<110){
                        fxCtx.beginPath(); fxCtx.moveTo(p.x,p.y); fxCtx.lineTo(p2.x,p2.y);
                        fxCtx.strokeStyle=`rgba(0,240,255,${0.06*(1-dist/110)*ca*2})`;
                        fxCtx.lineWidth=0.6; fxCtx.stroke();
                    }
                }
            }
            for(let i=ripples.length-1;i>=0;i--){
                const r=ripples[i]; r.radius+=r.speed; r.alpha-=0.004;
                if(r.alpha<=0||r.radius>r.maxRadius){ ripples.splice(i,1); continue; }
                fxCtx.beginPath(); fxCtx.arc(r.x,r.y,r.radius,0,Math.PI*2);
                fxCtx.strokeStyle=`rgba(0,240,255,${r.alpha*0.5})`; fxCtx.lineWidth=1.5;
                fxCtx.shadowColor='#00f0ff'; fxCtx.shadowBlur=15; fxCtx.stroke(); fxCtx.shadowBlur=0;
            }
            requestAnimationFrame(animateFX);
        }
        animateFX();
        window.addEventListener('resize',()=>{ fxCanvas.width=window.innerWidth; fxCanvas.height=window.innerHeight; });

        // ==================== 主逻辑 ====================
        const heartVal = document.getElementById('heart-val');
        const breathVal = document.getElementById('breath-val');
        const motionVal = document.getElementById('motion-val');
        const motionBadge = document.getElementById('motion-badge');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const canvas = document.getElementById('waveCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 900; canvas.height = 220;

        let port = null, reader = null, isReading = false, ws = null, mqttClient = null;
        let currentMode = 'serial';  // serial / ap / sta / mqtt
        const waveData = []; const MAX_POINTS = 120;

        function addLog(msg,color='#0f0'){ console.log(msg); }

        function drawWave(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle='rgba(0,240,255,0.1)'; ctx.lineWidth=0.5;
            for(let i=0;i<=6;i++){ const y=(canvas.height/6)*i; ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke(); }
            if(waveData.length<2)return;
            const min=Math.max(40,Math.min(...waveData)-10), max=Math.min(160,Math.max(...waveData)+10), range=max-min||1;
            ctx.beginPath(); ctx.strokeStyle='#ff2d78'; ctx.lineWidth=3; ctx.shadowColor='#ff2d78'; ctx.shadowBlur=20;
            waveData.forEach((v,i)=>{
                const x=(i/(MAX_POINTS-1))*canvas.width, y=canvas.height-((v-min)/range)*canvas.height;
                if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
            }); ctx.stroke();
            ctx.beginPath(); ctx.strokeStyle='rgba(255,45,120,0.3)'; ctx.lineWidth=8; ctx.shadowBlur=0;
            waveData.forEach((v,i)=>{
                const x=(i/(MAX_POINTS-1))*canvas.width, y=canvas.height-((v-min)/range)*canvas.height;
                if(i===0)ctx.moveTo(x,y); else ctx.lineTo(x,y);
            }); ctx.stroke();
        }

        function parseFrame(line){
            const clean = line.trim().toUpperCase();
            if(!clean.startsWith('AA55'))return null;
            if(clean.length>=10){
                const p=parseInt(clean.substring(4,6),16), b=parseInt(clean.substring(6,8),16), h=parseInt(clean.substring(8,10),16);
                let m=0; if(clean.length>=12)m=parseInt(clean.substring(10,12),16);
                if(!isNaN(p)&&!isNaN(b)&&!isNaN(h)) return {presence:p,breath:b,heart:h,motion:m};
            }
            const parts=clean.split(/\s+/);
            if(parts.length>=5){
                const p=parseInt(parts[1],16), b=parseInt(parts[2],16), h=parseInt(parts[3],16), m=parseInt(parts[4],16);
                if(!isNaN(p)&&!isNaN(b)&&!isNaN(h)) return {presence:p,breath:b,heart:h,motion:m};
            }
            return null;
        }

        function getMotionInfo(motion){
            if(motion<2)return {text:'安静',badgeClass:'badge-quiet'};
            if(motion<5)return {text:'微动',badgeClass:'badge-slight'};
            return {text:'体动',badgeClass:'badge-move'};
        }

        function handleFrame(line){
            const parsed = parseFrame(line);
            if(parsed){
                heartVal.textContent = parsed.heart;
                breathVal.textContent = parsed.breath;
                motionVal.textContent = parsed.motion;
                const mi = getMotionInfo(parsed.motion);
                motionBadge.textContent = mi.text;
                motionBadge.className = 'motion-badge '+mi.badgeClass;
                statusText.textContent = (parsed.presence===1?'在线监测':'无人')+' | '+mi.text;
                statusDot.className = 'status-dot dot-online';
                if(parsed.heart>0){ waveData.push(parsed.heart); if(waveData.length>MAX_POINTS)waveData.shift(); drawWave(); }
            }
        }

        function processBuffer(buffer){
            const indices=[]; let idx=buffer.indexOf('AA55');
            while(idx!==-1){ indices.push(idx); idx=buffer.indexOf('AA55',idx+1); }
            if(indices.length===0){
                if(buffer.endsWith('A')||buffer.endsWith('AA')||buffer.endsWith('AA5'))return buffer;
                return '';
            }
            for(let i=0;i<indices.length;i++){
                const start=indices[i], end=(i<indices.length-1)?indices[i+1]:buffer.length;
                const frame=buffer.substring(start,end).trim();
                if(frame.length>0)handleFrame(frame);
            }
            return buffer.substring(indices[indices.length-1]);
        }

        // 断开连接
        async function disconnectAll(){
            if(currentMode==='serial'){
                isReading=false;
                if(reader)try{await reader.cancel();}catch(e){}
                if(port)try{await port.close();}catch(e){}
                port=null; reader=null;
            } else if(currentMode==='ap' || currentMode==='sta'){
                if(ws){ ws.close(); ws=null; }
            } else if(currentMode==='mqtt'){
                if(mqttClient && mqttClient.isConnected()) mqttClient.disconnect();
                mqttClient=null;
            }
            document.getElementById('connectBtn').disabled = false;
            document.getElementById('disconnectBtn').disabled = true;
            statusText.textContent = '系统待命 · 已断开';
            statusDot.className = 'status-dot dot-offline';
            heartVal.textContent='--'; breathVal.textContent='--'; motionVal.textContent='--';
            motionBadge.textContent='--'; motionBadge.className='motion-badge';
        }

        // ========== 模式切换 ==========
        document.querySelectorAll('.mode-btn').forEach(btn=>{
            btn.addEventListener('click',()=>{
                document.querySelector('.mode-btn.active').classList.remove('active');
                btn.classList.add('active');
                const newMode = btn.dataset.mode;
                if(currentMode!==newMode) disconnectAll();
                currentMode = newMode;
                // 更新连接按钮文字
                document.getElementById('connectBtn').textContent = '◈ 连接';
            });
        });

        // ========== 连接按钮 ==========
        document.getElementById('connectBtn').addEventListener('click', async ()=>{
            if(currentMode==='serial'){
                try{
                    port = await navigator.serial.requestPort();
                    await port.open({baudRate:115200});
                    document.getElementById('connectBtn').disabled = true;
                    document.getElementById('disconnectBtn').disabled = false;
                    statusText.textContent = '串口已连接 · 等待数据';
                    statusDot.className = 'status-dot dot-online';
                    startSerialRead();
                }catch(e){ statusText.textContent='串口连接失败'; }
            } else if(currentMode==='ap'){
                showConfigModal('AP 热点配置', 'ESP IP (默认192.168.4.1)', '端口 (默认80)', '192.168.4.1', '80');
            } else if(currentMode==='sta'){
                showConfigModal('STA 局域网配置', '服务器 IP', '端口', '192.168.1.100', '8080');
            } else if(currentMode==='mqtt'){
                showConfigModal('MQTT 配置', 'Broker IP', '端口 (WebSocket)', 'broker.emqx.io', '8084');
            }
        });

        document.getElementById('disconnectBtn').addEventListener('click', disconnectAll);

        // 网络配置弹窗
        function showConfigModal(title, placeholder1, placeholder2, default1, default2){
            document.getElementById('configTitle').textContent = title;
            document.getElementById('configInput1').placeholder = placeholder1;
            document.getElementById('configInput2').placeholder = placeholder2;
            document.getElementById('configInput1').value = default1 || '';
            document.getElementById('configInput2').value = default2 || '';
            document.getElementById('configModal').classList.add('active');
        }

        document.getElementById('configCancelBtn').addEventListener('click', ()=>{
            document.getElementById('configModal').classList.remove('active');
        });

        document.getElementById('configSaveBtn').addEventListener('click', ()=>{
            const val1 = document.getElementById('configInput1').value.trim();
            const val2 = document.getElementById('configInput2').value.trim();
            document.getElementById('configModal').classList.remove('active');
            if(currentMode==='ap' || currentMode==='sta'){
                startWebSocket(`ws://${val1}:${val2}`);
            } else if(currentMode==='mqtt'){
                startMQTT(val1, parseInt(val2));
            }
        });

        // WebSocket 连接 (AP/STA)
        function startWebSocket(url){
            try{
                ws = new WebSocket(url);
                ws.onopen = ()=>{
                    document.getElementById('connectBtn').disabled = true;
                    document.getElementById('disconnectBtn').disabled = false;
                    statusText.textContent = `WebSocket 已连接 · ${url}`;
                    statusDot.className = 'status-dot dot-online';
                };
                ws.onmessage = (event)=>{ handleFrame(event.data); };
                ws.onerror = ()=>{ statusText.textContent='WebSocket 连接失败'; };
                ws.onclose = ()=>{ statusText.textContent='WebSocket 断开'; };
            }catch(e){ statusText.textContent='WebSocket 错误'; }
        }

        // MQTT 连接 (使用 Paho CDN)
        function startMQTT(host, port){
            if(typeof Paho === 'undefined'){
                alert('MQTT 库未加载，请确保网络可访问 CDN。');
                return;
            }
            mqttClient = new Paho.MQTT.Client(host, port, "web_"+Date.now());
            mqttClient.onConnectionLost = ()=> { statusText.textContent='MQTT 断开'; };
            mqttClient.onMessageArrived = (msg)=>{
                try{
                    const data = JSON.parse(msg.payloadString);
                    handleFrame(data.raw || `AA55${data.presence.toString(16)}${data.breath.toString(16)}${data.heart.toString(16)}`);
                }catch(e){}
            };
            mqttClient.connect({
                onSuccess:()=>{
                    document.getElementById('connectBtn').disabled = true;
                    document.getElementById('disconnectBtn').disabled = false;
                    statusText.textContent = `MQTT 已连接 · ${host}`;
                    statusDot.className = 'status-dot dot-online';
                    mqttClient.subscribe("radar/data");
                },
                onFailure:()=>{ statusText.textContent='MQTT 连接失败'; }
            });
        }

        // 串口读取
        async function startSerialRead(){
            isReading = true;
            const decoder = new TextDecoderStream();
            port.readable.pipeTo(decoder.writable);
            reader = decoder.readable.getReader();
            let buffer = '';
            try{
                while(isReading){
                    const {value, done} = await reader.read();
                    if(done)break;
                    if(value){ buffer+=value; buffer=processBuffer(buffer); }
                }
            }catch(e){}
        }

         // PWA Service Worker 注册
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker 已注册'))
                    .catch(err => console.log('SW 注册失败', err));
            });
        }
    </script>
